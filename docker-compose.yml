name: auth

services:
  auth-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: auth-api
    container_name: auth-api
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      Integration__PostgreSql__ConnectionString: ${POSTGRES_CONNECTION_STRING}
      Integration__OpenSearch__Url: ${OPENSEARCH_URL}
      Integration__OpenSearch__IndexPrefix: ${OPENSEARCH_INDEX_PREFIX}
      Integration__OpenSearch__EnsureIndicesOnStartup: ${OPENSEARCH_ENSURE_INDICES_ON_STARTUP}
      Integration__OpenSearch__ReindexOnStartup: ${OPENSEARCH_REINDEX_ON_STARTUP}
      Integration__OpenSearch__Username: ${OPENSEARCH_USERNAME}
      Integration__OpenSearch__Password: ${OPENSEARCH_PASSWORD}

      Integration__EncryptionKey: ${ENCRYPTION_KEY}
      Integration__Smtp__Enabled: ${SMTP_ENABLED}
      Integration__Smtp__Host: ${SMTP_HOST}
      Integration__Smtp__Port: ${SMTP_PORT}
      Integration__Smtp__UseSsl: ${SMTP_USE_SSL}
      Integration__Smtp__Username: ${SMTP_USERNAME}
      Integration__Smtp__Password: ${SMTP_PASSWORD}
      Integration__Smtp__FromEmail: ${SMTP_FROM_EMAIL}
      Integration__Smtp__FromName: ${SMTP_FROM_NAME}
      Integration__SmsGateway__Enabled: ${SMS_GATEWAY_ENABLED}
      Integration__SmsGateway__BaseUrl: ${SMS_GATEWAY_BASE_URL}
      Integration__SmsGateway__ApiKey: ${SMS_GATEWAY_API_KEY}
      Integration__SmsGateway__TimeoutSeconds: ${SMS_GATEWAY_TIMEOUT_SECONDS}
      Integration__Cors__AllowedOrigins: ${CORS_ALLOWED_ORIGINS}

      Integration__RabbitMq__Host: rabbitmq
      Integration__RabbitMq__Username: ${RABBITMQ_USER:-guest}
      Integration__RabbitMq__Password: ${RABBITMQ_PASSWORD:-guest}
      Integration__Redis__ConnectionString: ${REDIS_CONNECTION_STRING:-redis:6379}
    volumes:
      - ./certs:/app/certs:ro
    ports:
      - "${AUTH_API_PORT}:8080"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: auth-postgres
    environment:
      POSTGRES_DB: auth
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - auth_postgres_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: auth-rabbitmq
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    volumes:
      - auth_rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: auth-redis
    command: >
      sh -c 'if [ -n "$REDIS_PASSWORD" ]; then
        redis-server --requirepass "$REDIS_PASSWORD";
      else
        redis-server;
      fi'
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - auth_redis_data:/data
    healthcheck:
      test: >
        sh -c 'if [ -n "$REDIS_PASSWORD" ]; then
          redis-cli -a "$REDIS_PASSWORD" ping;
        else
          redis-cli ping;
        fi'
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  opensearch:
    image: opensearchproject/opensearch:2.15.0
    container_name: auth-opensearch
    profiles: ["local-opensearch"]
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "${OPENSEARCH_PORT}:9200"
      - "${OPENSEARCH_METRICS_PORT}:9600"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - auth_opensearch_data:/usr/share/opensearch/data

  mailhog:
    image: jcalonso/mailhog:latest
    container_name: auth-mailhog
    profiles: ["mailhog"]
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI

volumes:
  auth_postgres_data:
  auth_rabbitmq_data:
  auth_redis_data:
  auth_opensearch_data:
