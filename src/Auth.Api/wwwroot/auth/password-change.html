<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Смена пароля</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>[v-cloak] { display: none; }</style>
</head>
<body class="min-h-screen bg-gray-50 flex items-center justify-center p-4">
  <div v-scope="PasswordChangePage()" v-cloak class="w-full max-w-sm bg-white rounded-lg shadow p-8" @vue:mounted="loadRules">
    <h1 class="text-2xl font-semibold text-center mb-6">{{ t('passwordChangeTitle') }}</h1>

    <div v-if="error" class="bg-red-50 text-red-700 text-sm rounded p-3 mb-4">{{ error }}</div>

    <form @submit.prevent="submit" class="space-y-4">
      <div>
        <label for="new-password" class="block text-sm font-medium text-gray-700 mb-1">{{ t('newPassword') }}</label>
        <input id="new-password" v-model="newPassword" type="password" required autocomplete="new-password"
          class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <div>
        <label for="confirm-password" class="block text-sm font-medium text-gray-700 mb-1">{{ t('confirmPassword') }}</label>
        <input id="confirm-password" v-model="confirmPassword" type="password" required autocomplete="new-password"
          class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <ul class="text-xs space-y-1">
        <li v-for="check in getChecks()" :class="check.ok ? 'text-green-600' : 'text-gray-500'">{{ check.label }}</li>
      </ul>

      <button type="submit" :disabled="loading || !isValid()"
        class="w-full bg-blue-600 text-white rounded py-2 font-medium hover:bg-blue-700 disabled:opacity-50">
        {{ loading ? t('passwordChangeLoading') : t('passwordChangeSubmit') }}
      </button>
    </form>
  </div>

  <script type="module">
    import { createApp } from './js/petite-vue.js'
    import { t } from './js/i18n.js'
    import { api, getParams } from './js/shared.js'

    const { challenge_id: challengeId, return_url: returnUrl } =
      getParams('challenge_id', 'return_url');

    if (!challengeId) {
      location.href = '/auth/login.html';
    }

    function PasswordChangePage() {
      return {
        newPassword: '',
        confirmPassword: '',
        error: '',
        loading: false,
        t,
        rules: {
          minLength: 8,
          requireUppercase: false,
          requireLowercase: false,
          requireDigit: false,
          requireSpecialCharacter: false
        },

        getChecks() {
          const r = this.rules, p = this.newPassword;
          const list = [{ ok: p.length >= r.minLength, label: t('minLength', { n: r.minLength }) }];
          if (r.requireUppercase) list.push({ ok: /[A-Z]/.test(p), label: t('requireUppercase') });
          if (r.requireLowercase) list.push({ ok: /[a-z]/.test(p), label: t('requireLowercase') });
          if (r.requireDigit) list.push({ ok: /\d/.test(p), label: t('requireDigit') });
          if (r.requireSpecialCharacter) list.push({ ok: /[^A-Za-z0-9]/.test(p), label: t('requireSpecialCharacter') });
          list.push({ ok: p && p === this.confirmPassword, label: t('passwordsMatch') });
          return list;
        },

        isValid() {
          return this.getChecks().every(c => c.ok);
        },

        async loadRules() {
          const { ok, data } = await api('/api/account/password-requirements');
          if (ok) this.rules = data;
        },

        async submit() {
          this.error = '';
          this.loading = true;
          const url = '/api/account/password/forced-change';
          const { ok, data, error } = await api(url, 'POST', {
            challengeId, newPassword: this.newPassword
          });

          if (error) { 
            this.error = error; 
            this.loading = false; 
            return; 
          }

          if (!ok) {
            this.error = data.detail || t('passwordChangeFailed');
            this.loading = false;
            return;
          }

          if (!returnUrl) {
            location.href = '/auth/login.html';
            return;
          }
          
          const encodedUri = encodeURIComponent(returnUrl);
          location.href = '/auth/login.html?returnUrl=' + encodedUri;
        }
      }
    }

    createApp({ PasswordChangePage }).mount()
  </script>
</body>
</html>
